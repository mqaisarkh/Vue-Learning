<!doctype html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <title>List and Computed Properties</title>
    <script src="https://unpkg.com/vue@3"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-full grid place-items-center">
    <div id="app">
        <section v-show="inprogressAssignments.length">
            <h2 class="font-bold mb-2">In Progress Assignments</h2>
            <ul>
                <li v-for="assignment in inprogressAssignments" :key="assignment.id">
                    <label>
                        {{ assignment.name}}

                        <input type="checkbox" v-model="assignment.complete">
                    </label>
                </li>
            </ul>

        </section>

        <section v-show="completedAssignments.length" class="mt-8">
            <h2 class="font-bold mb-2">Completed Assignments</h2>
            <ul>
                <li v-for="assignment in completedAssignments" :key="assignment.id">
                    <label>
                        {{ assignment.name}}

                        <input type="checkbox" v-model="assignment.complete">
                    </label>
                </li>
            </ul>

        </section>
    </div>

    <script>
        let app = {
            data() {
                return {
                    assignments: [
                        { id: 1, name: 'Finish Projects', complete: false },
                        { id: 2, name: 'Read Chapter 4', complete: false },
                        { id: 3, name: 'Turn in Homework', complete: false },
                    ]
                }
            },

            computed: {
                completedAssignments() {
                    return this.assignments.filter(a => a.complete)
                },

                inprogressAssignments() {
                    return this.assignments.filter(a => !a.complete)
                }
            }
        };

        Vue.createApp(app).mount('#app');
    </script>
</body>

</html>
